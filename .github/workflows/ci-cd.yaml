name: Weather Data CICD

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy-codebase:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - name: Checkout Code
        uses: actions/checkout@v3

      # Authenticate to GCP Account
      - id: auth
        uses: google-github-actions/auth@v2.0.0  
        with:
          workload_identity_provider: 'projects/611054035776/locations/global/workloadIdentityPools/weather-project/providers/github'
          service_account: 'findzubair7777@project-19330bef-483f-4dc8-bf6.iam.gserviceaccount.com'

      # Setup Google Cloud SDK
      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      # Sync Spark job to GCS
      - name: Upload Spark Job to GCS
        run: |
          gsutil cp spark_job/weather_data_processing.py gs://weather-project-777/script/

      # Sync Airflow DAG Composer
      - name: Upload Airflow DAG (in Dag Folder)
        run: |
          gcloud composer environments storage dags import \
            --environment airflow-dev \
            --location europe-west1 \
            --source weather_airflow_dags